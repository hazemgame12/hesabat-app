kind = "web"
previewPath = "/"
title = "HG Financial Consulting"
version = "1.0.0"
id = "artifacts/hg-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18431

[services.development]
run = "pnpm --filter @workspace/hg-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hg-website", "run", "build" ]
publicDir = "artifacts/hg-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18431"
BASE_PATH = "/"
