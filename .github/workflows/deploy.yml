name: Deploy Hesabat Production

on:
  # ⚠️ Production deploy is MANUAL ONLY during Beta phase
  # Change to push: branches: [main] after Beta is approved
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Guard — require explicit confirmation
        if: ${{ github.event.inputs.confirm != 'DEPLOY' }}
        run: |
          echo "❌ You must type DEPLOY in the confirm field to deploy production."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build libs
        run: pnpm run typecheck:libs

      - name: Build Hesabat frontend
        run: NODE_ENV=production pnpm --filter @workspace/hesabat exec vite build --config vite.production.config.ts

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Deploy Production to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export CI=true
            cd /var/www/hesabat
            git fetch origin
            git checkout main
            git pull origin main
            CI=true pnpm install --no-frozen-lockfile
            pnpm run typecheck:libs
            NODE_ENV=production pnpm --filter @workspace/hesabat exec vite build --config vite.production.config.ts
            pnpm --filter @workspace/api-server run build
            pm2 reload hesabat-api --env production || pm2 start ecosystem.config.cjs --env production
            pm2 save
            echo "✅ Production deployed at $(date)"
