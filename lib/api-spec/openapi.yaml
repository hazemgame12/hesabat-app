openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and account management
  - name: accounts
    description: Chart of accounts
  - name: dashboard
    description: Dashboard aggregates
  - name: team
    description: Team members, roles, and invitations management
  - name: invitations
    description: Public invitation acceptance
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new company and its owner user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Company and user created; session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in; session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all accounts for the current company
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate account code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts/{id}:
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Aggregate counts for the dashboard
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /company:
    get:
      operationId: getCompany
      tags: [company]
      summary: Get the current company's profile
      responses:
        "200":
          description: Company profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      tags: [company]
      summary: Update the current company's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /company/logo:
    post:
      operationId: uploadCompanyLogo
      tags: [company]
      summary: Upload and set the company logo (multipart/form-data, field "file")
      responses:
        "200":
          description: Updated company with new logo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "400":
          description: No file or invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List members of the current company
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /team/members/{id}:
    patch:
      operationId: updateMemberRole
      tags: [team]
      summary: Change a member's role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeMember
      tags: [team]
      summary: Remove a member from the company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "400":
          description: Invalid operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /team/invitations:
    get:
      operationId: listInvitations
      tags: [team]
      summary: List pending invitations for the current company
      responses:
        "200":
          description: Invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInvitation"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createInvitation
      tags: [team]
      summary: Invite a new member by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationInput"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedInvitation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already a member or invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /team/invitations/{id}:
    delete:
      operationId: revokeInvitation
      tags: [team]
      summary: Revoke a pending invitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invitations/{token}:
    get:
      operationId: getInvitation
      tags: [invitations]
      summary: Get public details of an invitation by token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationInfo"
        "404":
          description: Invalid or expired invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept an invitation and create the member account
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationInput"
      responses:
        "201":
          description: Account created; session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invalid or expired invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthUser:
      type: object
      required: [id, name, email, role, companyId, companyName]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        companyId:
          type: string
        companyName:
          type: string

    SignupInput:
      type: object
      required: [companyName, name, email, password]
      properties:
        companyName:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        country:
          type: string
          enum: [EG, SA, AE]
        baseCurrency:
          type: string
          enum: [EGP, SAR, AED, USD]

    Company:
      type: object
      required: [id, name, country, baseCurrency]
      properties:
        id:
          type: string
        name:
          type: string
        tradeName:
          type: ["string", "null"]
        taxRegistrationNumber:
          type: ["string", "null"]
        activityDescription:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        country:
          type: string
        baseCurrency:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        tradeName:
          type: ["string", "null"]
        taxRegistrationNumber:
          type: ["string", "null"]
        activityDescription:
          type: ["string", "null"]
        country:
          type: string
          enum: [EG, SA, AE]
        baseCurrency:
          type: string
          enum: [EGP, SAR, AED, USD]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    Account:
      type: object
      required: [id, code, name, type, isGroup, createdAt]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        parentId:
          type: ["string", "null"]
        isGroup:
          type: boolean
        createdAt:
          type: string

    AccountInput:
      type: object
      required: [code, name, type]
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        parentId:
          type: ["string", "null"]
        isGroup:
          type: boolean

    AccountUpdate:
      type: object
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        parentId:
          type: ["string", "null"]
        isGroup:
          type: boolean

    DashboardSummary:
      type: object
      required: [totalAccounts, accountsByType]
      properties:
        totalAccounts:
          type: integer
        accountsByType:
          type: array
          items:
            $ref: "#/components/schemas/AccountTypeCount"

    AccountTypeCount:
      type: object
      required: [type, count]
      properties:
        type:
          type: string
        count:
          type: integer

    TeamMember:
      type: object
      required: [id, name, email, role, createdAt, isSelf]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, manager, accountant, data_entry, viewer]
        createdAt:
          type: string
        isSelf:
          type: boolean

    RoleUpdateInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [manager, accountant, data_entry, viewer]

    TeamInvitation:
      type: object
      required: [id, email, role, status, expiresAt, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [manager, accountant, data_entry, viewer]
        status:
          type: string
        expiresAt:
          type: string
        createdAt:
          type: string

    CreateInvitationInput:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [manager, accountant, data_entry, viewer]

    CreatedInvitation:
      type: object
      required: [id, email, role, expiresAt, token]
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        expiresAt:
          type: string
        token:
          type: string

    InvitationInfo:
      type: object
      required: [companyName, email, role]
      properties:
        companyName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [manager, accountant, data_entry, viewer]

    AcceptInvitationInput:
      type: object
      required: [name, password]
      properties:
        name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
