        "200":
          description: Aging
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingReport"

  /reports/outstanding-invoices:
    get:
      operationId: getOutstandingInvoices
      tags: [receivablesReports]
      summary: Approved invoices with an outstanding balance
      parameters:
        - name: kind
          in: query
          required: true
          schema:
            type: string
            enum: [sales, purchase]
      responses:
        "200":
          description: Outstanding invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutstandingInvoice"

  /reports/invoice-summary:
    get:
      operationId: getInvoiceSummaryReport
      tags: [receivablesReports]
      summary: Invoice totals grouped by party or cost center
      parameters:
        - name: kind
          in: query
          required: true
          schema:
            type: string
            enum: [sales, purchase]
        - name: groupBy
          in: query
          required: true
          schema:
            type: string
            enum: [party, costCenter]
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SummaryRow"

  /reports/payments-summary:
    get:
      operationId: getPaymentsSummaryReport
      tags: [receivablesReports]
