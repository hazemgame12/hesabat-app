components:
  schemas:
    OpeningBalanceAccountLine:
      type: object
      required: [accountId, debit, credit]
      properties:
        accountId:
          type: string
        debit:
          type: number
        credit:
          type: number
    OpeningBalanceBankLine:
      type: object
      required: [bankAccountId, balance]
      properties:
        bankAccountId:
          type: string
        balance:
          type: number
    OpeningBalanceCustomerLine:
      type: object
      required: [customerId, balance]
      properties:
        customerId:
          type: string
        balance:
          type: number
    OpeningBalanceSupplierLine:
      type: object
      required: [supplierId, balance]
      properties:
        supplierId:
          type: string
